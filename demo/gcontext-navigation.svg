<svg width="100%" viewBox="0 0 680 352" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How gcontext navigation works: the agent starts at the llms.txt index, which lists one line per loaded module, then follows links into integration modules (permanent) and task modules (disposable), each holding its own files.">
<title>How gcontext navigation works</title>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;fill:#1f2328}
.t{font-size:14px;font-weight:500}
.s{font-size:12px;fill:#59636e}
.flow{stroke:#9aa0a6;stroke-width:1.5;fill:none}
.ahead{fill:#9aa0a6}
.gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}
.gray .t{fill:#2C2C2A}.gray .s{fill:#5F5E5A}
.purple rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:.75}
.purple .t{fill:#3C3489}.purple .s{fill:#534AB7}
.teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}
.teal .t{fill:#085041}.teal .s{fill:#0F6E56}
.coral rect{fill:#FAECE7;stroke:#993C1D;stroke-width:.75}
.coral .t{fill:#712B13}.coral .s{fill:#993C1D}
.sw-teal{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}
.sw-coral{fill:#FAECE7;stroke:#993C1D;stroke-width:.75}
@media (prefers-color-scheme:dark){
 text{fill:#c9d1d9}
 .s{fill:#9aa0a6}
 .flow{stroke:#7d8590}.ahead{fill:#7d8590}
 .gray rect{fill:#2C2C2A;stroke:#B4B2A9}.gray .t{fill:#F1EFE8}.gray .s{fill:#D3D1C7}
 .purple rect{fill:#3C3489;stroke:#AFA9EC}.purple .t{fill:#EEEDFE}.purple .s{fill:#CECBF6}
 .teal rect{fill:#085041;stroke:#5DCAA5}.teal .t{fill:#E1F5EE}.teal .s{fill:#9FE1CB}
 .coral rect{fill:#4A1B0C;stroke:#F0997B}.coral .t{fill:#FAECE7}.coral .s{fill:#F5C4B3}
 .sw-teal{fill:#085041;stroke:#5DCAA5}
 .sw-coral{fill:#4A1B0C;stroke:#F0997B}
}
</style>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M1 1 L9 5 L1 9 z" class="ahead"/></marker>
</defs>

<g class="gray">
<rect x="250" y="20" width="180" height="46" rx="8"/>
<text class="t" x="340" y="40" text-anchor="middle">Your agent</text>
<text class="s" x="340" y="56" text-anchor="middle">Claude Code · Cursor · Codex</text>
</g>

<line x1="340" y1="66" x2="340" y2="90" class="flow" marker-end="url(#arrow)"/>

<g class="purple">
<rect x="190" y="94" width="300" height="48" rx="8"/>
<text class="t" x="340" y="113" text-anchor="middle">llms.txt · index</text>
<text class="s" x="340" y="130" text-anchor="middle">always loaded · one line per module</text>
</g>

<line x1="340" y1="142" x2="148" y2="165" class="flow" marker-end="url(#arrow)"/>
<line x1="340" y1="142" x2="340" y2="165" class="flow" marker-end="url(#arrow)"/>
<line x1="340" y1="142" x2="532" y2="165" class="flow" marker-end="url(#arrow)"/>

<g class="teal">
<rect x="60" y="168" width="172" height="120" rx="10"/>
<text class="t" x="76" y="191">stripe/</text>
<text class="s" x="76" y="207">integration</text>
<text class="s" x="76" y="233">info.md</text>
<text class="s" x="76" y="255">llms.txt</text>
<text class="s" x="76" y="277">module.yaml</text>
</g>

<g class="teal">
<rect x="254" y="168" width="172" height="120" rx="10"/>
<text class="t" x="270" y="191">postgres/</text>
<text class="s" x="270" y="207">integration</text>
<text class="s" x="270" y="233">info.md</text>
<text class="s" x="270" y="255">llms.txt</text>
<text class="s" x="270" y="277">module.yaml</text>
</g>

<g class="coral">
<rect x="448" y="168" width="172" height="120" rx="10"/>
<text class="t" x="464" y="191">paddle-migration/</text>
<text class="s" x="464" y="207">task</text>
<text class="s" x="464" y="233">brief.md</text>
<text class="s" x="464" y="255">status.md</text>
<text class="s" x="464" y="277">llms.txt</text>
</g>

<rect class="sw-teal" x="196" y="306" width="12" height="12" rx="3"/>
<text class="s" x="214" y="316">integration · permanent</text>
<rect class="sw-coral" x="404" y="306" width="12" height="12" rx="3"/>
<text class="s" x="422" y="316">task · disposable</text>
</svg>
